<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>24시간! · 청소년 정치 성향 설문조사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root {
    --bg-0: #07070d;
    --bg-1: #0e0e1a;
    --bg-2: #15162a;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.16);
    --text: #e9ecf3;
    --text-soft: #b8bccc;
    --text-dim: #7a7f93;
    --accent: #8b8df0;
    --progressive: #3b82f6;
    --moderate: #a855f7;
    --conservative: #ef4444;
    --shadow: 0 30px 80px -20px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text);
    background: var(--bg-0);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Background ambience */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 10%, rgba(59,130,246,0.18), transparent 60%),
      radial-gradient(ellipse 50% 40% at 85% 15%, rgba(239,68,68,0.14), transparent 60%),
      radial-gradient(ellipse 60% 60% at 50% 100%, rgba(168,85,247,0.18), transparent 60%),
      linear-gradient(180deg, #06060c 0%, #0a0a18 100%);
    z-index: -2;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 80%);
    z-index: -1;
    pointer-events: none;
  }

  .app {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 24px 20px 80px;
  }

  /* Top brand bar */
  .brand {
    width: 100%;
    max-width: 720px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0 28px;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }
  .brand-left {
    display: flex; align-items: center; gap: 10px;
  }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, #3b82f6, #a855f7 50%, #ef4444);
    box-shadow: 0 6px 20px rgba(59,130,246,0.35);
    display: grid; place-items: center;
    font-weight: 800; color: #fff; font-size: 12px;
  }
  .brand-name { color: var(--text); font-weight: 600; letter-spacing: 0.01em; }
  .brand-name span { color: var(--text-dim); font-weight: 400; }
  .brand-right { font-variant-numeric: tabular-nums; }

  /* Card / screen */
  .screen {
    width: 100%;
    max-width: 720px;
    background: linear-gradient(180deg, rgba(20,21,40,0.85), rgba(14,14,26,0.85));
    border: 1px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(20px) saturate(120%);
    -webkit-backdrop-filter: blur(20px) saturate(120%);
    overflow: hidden;
    position: relative;
  }

  /* Progress bar */
  .progress-wrap {
    padding: 18px 24px 0;
  }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text-dim);
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }
  .progress-track {
    height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #a855f7, #ef4444);
    width: 0%;
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .body {
    padding: 36px 32px 32px;
  }
  @media (max-width: 560px) {
    .body { padding: 28px 22px 22px; }
  }

  /* Typography */
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600;
    color: var(--text-soft);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .eyebrow .dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
  .eyebrow.cat-society .dot { background: #60a5fa; box-shadow: 0 0 12px #60a5fa; }
  .eyebrow.cat-economy .dot { background: #f59e0b; box-shadow: 0 0 12px #f59e0b; }
  .eyebrow.cat-security .dot { background: #34d399; box-shadow: 0 0 12px #34d399; }

  h1 {
    font-size: 32px; line-height: 1.25;
    font-weight: 800; letter-spacing: -0.02em;
    margin: 0 0 16px;
  }
  h2 {
    font-size: 22px; line-height: 1.4;
    font-weight: 700; letter-spacing: -0.01em;
    margin: 0 0 24px;
  }
  .lead {
    color: var(--text-soft);
    font-size: 15px; line-height: 1.7;
    margin: 0 0 24px;
  }

  /* Hero */
  .hero-title {
    font-size: 44px; line-height: 1.1;
    font-weight: 800; letter-spacing: -0.03em;
    margin: 6px 0 18px;
  }
  .hero-title .grad {
    background: linear-gradient(90deg, #60a5fa 0%, #c084fc 50%, #f87171 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  @media (max-width: 560px) {
    .hero-title { font-size: 34px; }
    h1 { font-size: 26px; }
    h2 { font-size: 19px; }
  }

  .meta-row {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 22px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-soft);
    background: rgba(255,255,255,0.02);
  }
  .chip strong { color: var(--text); font-weight: 600; }

  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin: 18px 0 28px;
  }
  @media (max-width: 560px) { .info-grid { grid-template-columns: 1fr; } }
  .info-card {
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: rgba(255,255,255,0.02);
  }
  .info-card .label {
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .info-card .value {
    font-size: 15px; color: var(--text); font-weight: 500;
  }
  .info-card .value.small { font-size: 13px; }

  .privacy-note {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 14px 16px;
    border: 1px dashed var(--line-strong);
    border-radius: 12px;
    background: rgba(139,141,240,0.04);
    margin-bottom: 28px;
  }
  .privacy-note svg {
    flex-shrink: 0;
    color: var(--accent);
  }
  .privacy-note p {
    margin: 0; font-size: 13px; line-height: 1.65;
    color: var(--text-soft);
  }

  /* Inputs */
  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 13px; font-weight: 600;
    color: var(--text); margin-bottom: 8px;
    letter-spacing: 0.01em;
  }
  .field label .req {
    color: #f87171; margin-left: 4px;
  }
  .field input[type="text"], .field select {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  .field input[type="text"]:focus, .field select:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(139,141,240,0.06);
    box-shadow: 0 0 0 4px rgba(139,141,240,0.12);
  }
  .field .hint {
    font-size: 12px; color: var(--text-dim); margin-top: 6px;
  }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: ""; position: absolute; right: 18px; top: 50%;
    width: 8px; height: 8px;
    border-right: 1.5px solid var(--text-soft);
    border-bottom: 1.5px solid var(--text-soft);
    transform: translateY(-70%) rotate(45deg);
    pointer-events: none;
  }

  /* Options (questions) */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    position: relative;
    padding: 16px 18px 16px 50px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: rgba(255,255,255,0.02);
    color: var(--text-soft);
    font-size: 15px; line-height: 1.55;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    user-select: none;
  }
  .option:hover {
    border-color: var(--line-strong);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    transform: translateY(-1px);
  }
  .option::before {
    content: "";
    position: absolute; left: 16px; top: 50%;
    transform: translateY(-50%);
    width: 20px; height: 20px;
    border: 1.5px solid var(--line-strong);
    border-radius: 999px;
    transition: all 0.2s;
  }
  .option::after {
    content: "";
    position: absolute; left: 22px; top: 50%;
    transform: translateY(-50%) scale(0);
    width: 8px; height: 8px;
    background: #fff;
    border-radius: 999px;
    transition: transform 0.2s;
  }
  .option.selected {
    border-color: var(--accent);
    background: linear-gradient(135deg, rgba(139,141,240,0.16), rgba(139,141,240,0.06));
    color: var(--text);
    box-shadow: 0 0 0 1px rgba(139,141,240,0.5), 0 10px 30px -10px rgba(139,141,240,0.4);
  }
  .option.selected::before {
    border-color: var(--accent);
    background: var(--accent);
  }
  .option.selected::after { transform: translateY(-50%) scale(1); }

  /* Buttons */
  .actions {
    display: flex; gap: 10px;
    margin-top: 28px;
    justify-content: space-between;
  }
  .btn {
    padding: 14px 22px;
    border-radius: 12px;
    font-size: 15px; font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
    border: 1px solid transparent;
    display: inline-flex; align-items: center; gap: 8px;
    letter-spacing: 0.01em;
  }
  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    box-shadow: 0 10px 30px -10px rgba(139,92,246,0.6),
                inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 40px -10px rgba(139,92,246,0.7),
                inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-primary:disabled {
    opacity: 0.4; cursor: not-allowed; transform: none;
    box-shadow: none;
  }
  .btn-ghost {
    background: rgba(255,255,255,0.03);
    border-color: var(--line-strong);
    color: var(--text-soft);
  }
  .btn-ghost:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text);
  }
  .btn-block { width: 100%; justify-content: center; }

  /* Q transition */
  .q-card { animation: fadeUp 0.45s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Result screen */
  .result-spectrum {
    margin: 24px 0 28px;
    padding: 24px 22px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(255,255,255,0.02);
  }
  .spectrum-bar {
    position: relative;
    height: 14px;
    border-radius: 999px;
    background: linear-gradient(90deg,
      #3b82f6 0%, #3b82f6 25%,
      #8b5cf6 25%, #8b5cf6 50%,
      #d946ef 50%, #d946ef 75%,
      #ef4444 75%, #ef4444 100%);
    margin: 14px 0 12px;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
  }
  .spectrum-marker {
    position: absolute; top: 50%;
    transform: translate(-50%, -50%);
    width: 26px; height: 26px;
    border-radius: 999px;
    background: #fff;
    border: 3px solid #0e0e1a;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.9), 0 8px 22px rgba(0,0,0,0.6);
    transition: left 1.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .spectrum-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-top: 4px;
  }
  .spectrum-labels span { flex: 1; text-align: center; }
  .spectrum-labels span:first-child { text-align: left; }
  .spectrum-labels span:last-child { text-align: right; }

  .result-headline {
    text-align: center;
    margin: 8px 0 0;
  }
  .result-headline .score {
    font-size: 13px; color: var(--text-dim);
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .result-headline .label {
    font-size: 48px; font-weight: 800;
    letter-spacing: -0.02em;
    margin: 6px 0 4px;
    background: linear-gradient(90deg, #fff, #c7c8e0);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .result-headline .meta {
    color: var(--text-soft);
    font-size: 14px;
  }
  .result-headline .meta strong { color: var(--text); }

  .breakdown {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    margin: 24px 0 20px;
  }
  @media (max-width: 560px) { .breakdown { grid-template-columns: 1fr; } }
  .breakdown-card {
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: rgba(255,255,255,0.02);
  }
  .breakdown-card .name {
    font-size: 12px; color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .breakdown-card .val {
    font-size: 22px; font-weight: 700; letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .mini-bar {
    height: 6px; border-radius: 999px;
    background: rgba(255,255,255,0.06);
    position: relative; overflow: hidden;
  }
  .mini-bar > i {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, #3b82f6, #a855f7, #ef4444);
    border-radius: 999px;
    width: 0%;
    transition: width 1.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .self-compare {
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: rgba(255,255,255,0.02);
    color: var(--text-soft);
    font-size: 14px; line-height: 1.65;
    margin-bottom: 8px;
  }
  .self-compare strong { color: var(--text); }

  /* Yes screen */
  .thanks-wrap {
    text-align: center; padding: 12px 0;
  }
  .thanks-emoji {
    width: 84px; height: 84px;
    border-radius: 999px;
    margin: 0 auto 20px;
    display: grid; place-items: center;
    background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(139,92,246,0.18));
    border: 1px solid rgba(139,141,240,0.4);
    box-shadow: 0 20px 50px -10px rgba(139,92,246,0.4);
  }

  /* Footer */
  .footer {
    margin-top: 22px;
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }
  .footer a { color: var(--text-soft); text-decoration: none; }

  /* Hidden helper */
  .hidden { display: none !important; }

  /* small flourish on hero */
  .hero-orb {
    position: absolute;
    width: 280px; height: 280px;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.55;
    pointer-events: none;
  }
  .hero-orb.a { top: -90px; right: -60px; background: radial-gradient(circle, #ef4444 0%, transparent 70%); }
  .hero-orb.b { bottom: -100px; left: -60px; background: radial-gradient(circle, #3b82f6 0%, transparent 70%); }

  /* Loader dots */
  .submit-loader { display: inline-flex; gap: 4px; align-items: center; }
  .submit-loader i {
    width: 6px; height: 6px; border-radius: 999px;
    background: #fff; opacity: 0.4;
    animation: dotp 1.2s infinite ease-in-out;
  }
  .submit-loader i:nth-child(2) { animation-delay: 0.15s; }
  .submit-loader i:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotp {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.1); }
  }

  /* radio group styled like options but smaller for ideology */
  .radio-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .radio-grid .option { padding-left: 50px; }
</style>
</head>
<body>
<div class="app">
  <!-- Brand bar -->
  <div class="brand">
    <div class="brand-left">
      <div class="brand-mark">24</div>
      <div class="brand-name">24시간! <span>· 청소년 정치 성향 연구</span></div>
    </div>
    <div class="brand-right" id="brandClock">민족사관고등학교</div>
  </div>

  <!-- Main card -->
  <main class="screen" id="screen">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progressLabel">시작 전</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="body" id="body"></div>
  </main>

  <div class="footer">
    조사기관 · 민족사관고등학교 주제탐구 팀 「24시간!」 (김예준 · 송경은 · 임성후 · 임유진) · 지도교사 김상래
    <br/>웹사이트 제작 및 기술 지원 : 심재민
  </div>
</div>

<script>
/* ============================================================
 *  설정 — 응답을 저장할 Google Apps Script Web App URL
 *  비워두면 응답은 어디에도 전송되지 않습니다.
 *  설정 방법은 apps-script/Code.gs 파일 상단 주석 참고.
 * ============================================================ */
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwvsu-hAbznRx3eh7xa3jPBKl4mk9XeLAwYj4nXTw_Va9VIQggAylVDnXK52-KWP_ZSgw/exec"; // 예: "https://script.google.com/macros/s/AKfycb..../exec"

/* ============================================================
 *  데이터 정의
 * ============================================================ */

// 점수: 진보 0 / 중도진보 3.3 / 중도보수 6.7 / 보수 10
const S = { L: 0, ML: 3.3, MC: 6.7, C: 10 };

// 질문지 (PDF 기반). 카테고리: society / economy / security
// 각 옵션의 score는 진보→보수 방향
const QUESTIONS = [
  /* ============ <사회> ============ */
  {
    cat: "society", catLabel: "사회 · Society", num: 1, total: 17, tag: "성평등",
    q: "현재 사회에서 성평등은 얼마나 실현되었다고 생각하십니까?",
    opts: [
      { t: "여전히 성차별이 존재하므로, 이를 해결하기 위한 정책을 더욱 확대해야 한다.", s: S.L },
      { t: "대부분의 분야에서 성차별은 사라졌다고 본다.", s: S.ML },
      { t: "성평등은 거의 실현되었으므로 관련 정책은 점차 줄여 나가야 한다.", s: S.MC },
      { t: "현 사회는 오히려 남성에 대한 역차별이 발생하는 사회이며, 여성에게 유리한 정책은 폐지해야 한다.", s: S.C },
    ]
  },
  {
    cat: "society", catLabel: "사회 · Society", num: 2, total: 17, tag: "성소수자",
    q: "성소수자에 대하여 어떻게 생각하십니까?",

/* ============================================================

function setProgress(label, pct) {
  $progressLabel.textContent = label;
  $progressPct.textContent = Math.round(pct) + "%";
  $progressFill.style.width = pct + "%";
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function transitionTo(html) {
  $body.style.opacity = 0;
  $body.style.transform = "translateY(8px)";
  setTimeout(() => {
    $body.innerHTML = html;
    $body.style.transition = "opacity .35s ease, transform .35s ease";
    requestAnimationFrame(() => {
      $body.style.opacity = 1;
      $body.style.transform = "translateY(0)";
    });
  }, 200);
}

// 응답을 Google Sheets로 전송 (단 한 번만)
let _submitted = false;
function submitToSheet() {
  if (_submitted) return;
  if (!WEBHOOK_URL || !/^https?:\/\//.test(WEBHOOK_URL)) return;
  _submitted = true;

  const r = computeResult();
  const payload = {
    school: state.school,
    studentId: state.studentId,
    // 각 문항의 '점수' 자체를 저장 (0 / 3.3 / 6.7 / 10)
    answers: QUESTIONS.map((q, i) => q.opts[state.answers[i]].s),
    avg: Number(r.avg.toFixed(3)),
    category: r.cat,
    bySection: {
      society:  Number(r.bySection.society.toFixed(3)),
      economy:  Number(r.bySection.economy.toFixed(3)),
      security: Number(r.bySection.security.toFixed(3)),
    },
    selfIdeology: state.selfIdeology !== null ? IDEOLOGY_OPTIONS[state.selfIdeology].label : null,
    joinSecond: state.joinSecond,
  };

  try {
    fetch(WEBHOOK_URL, {
      method: "POST",
      // Content-Type을 명시하지 않아 CORS preflight를 피하고,
      // Apps Script 쪽에서는 e.postData.contents 로 그대로 받습니다.
      body: JSON.stringify(payload),
    }).catch(() => {});
  } catch (_) {}
}

function computeResult() {
  // 17문항 점수 평균
  let sum = 0;
  const catSums = { society: 0, economy: 0, security: 0 };
  const catCnts = { society: 0, economy: 0, security: 0 };
  QUESTIONS.forEach((q, i) => {
    const s = q.opts[state.answers[i]].s;
    sum += s;
    catSums[q.cat] += s;
    catCnts[q.cat] += 1;
  });
  const avg = sum / QUESTIONS.length;
  const cat = avg < 2.5 ? "진보" :
              avg < 5   ? "중도진보" :
              avg < 7.5 ? "중도보수" : "보수";
  return {
    avg,
    cat,
    bySection: {
      society: catSums.society / catCnts.society,
      economy: catSums.economy / catCnts.economy,
      security: catSums.security / catCnts.security,
    },
  };
}

function categoryRangeText(cat) {
  return {
    "진보":    "평균 0 ~ 2.5 구간 · 진보",
    "중도진보": "평균 2.5 ~ 5 구간 · 중도진보",
    "중도보수": "평균 5 ~ 7.5 구간 · 중도보수",
    "보수":    "평균 7.5 ~ 10 구간 · 보수",
  }[cat];
}

function categoryColor(cat) {
  return {
    "진보":   "#3b82f6",
    "중도진보":"#8b5cf6",
    "중도보수":"#d946ef",
    "보수":   "#ef4444",
  }[cat];
}

function renderSelfCompareText(cat, selfLabel) {
  // 점수와 자기 인식의 차이를 가벼운 톤으로

  const catIdx = { "진보":0, "중도진보":1, "중도보수":3, "보수":4 }[cat];
  if (selfIdx === -1) {
    return `1차 검사 결과 본인의 응답은 <strong>${escapeHtml(cat)}</strong> 성향에 가깝게 분석되었습니다.`;
  }
  if (selfIdx === catIdx) {
    return `평소 본인이 인식하시는 정치 성향과 1차 검사 결과가 거의 <strong>일치</strong>합니다. 응답이 매우 일관적이네요.`;
  }
  if (Math.abs(selfIdx - catIdx) === 1) {
    return `본인이 인식하시는 정치 성향(<strong>${escapeHtml(selfLabel)}</strong>)과 1차 검사 결과(<strong>${escapeHtml(cat)}</strong>)가 <strong>가까운 편</strong>입니다.`;
  }
  return `본인이 인식하시는 정치 성향(<strong>${escapeHtml(selfLabel)}</strong>)과 1차 검사 결과(<strong>${escapeHtml(cat)}</strong>) 사이에 다소 차이가 있습니다. 본인이 평소 어떤 가치를 중요하게 여기는지 돌아보는 계기가 될 수 있겠네요.`;
}

function showToast(msg) {
  let t = document.getElementById("toast");
  if (!t) {
    t = document.createElement("div");
    t.id = "toast";
    t.style.cssText = `
      position: fixed; left: 50%; bottom: 36px;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 20px;
      background: rgba(20,20,40,0.95);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 12px; color: #fff;
      font-size: 14px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      opacity: 0; transition: opacity .3s, transform .3s;
      z-index: 100; backdrop-filter: blur(10px);
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  requestAnimationFrame(() => {
    t.style.opacity = 1;
    t.style.transform = "translateX(-50%) translateY(0)";
  });
  setTimeout(() => {
    t.style.opacity = 0;
    t.style.transform = "translateX(-50%) translateY(20px)";
  }, 2200);
}

function renderThanks() {
  submitToSheet();
  setProgress("완료", 100);
  transitionTo(`
    <div class="q-card thanks-wrap">
      <div class="thanks-emoji">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#c4b5fd" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h1 style="margin-bottom:10px;">감사합니다!</h1>
      <p class="lead" style="text-align:center;">
        1차 검사 응답이 정상적으로 제출되었습니다.<br/>
        2차 실험은 <strong style="color:var(--text);">5월 30일 또는 31일</strong>에 진행되며, <br/>
        구체적인 시간과 오픈채팅방 링크는 학번을 통해 개별 안내드릴 예정입니다.
      </p>
      <div class="meta-row" style="justify-content:center; margin: 24px 0 8px;">
        <span class="chip">학번 <strong>&nbsp;${escapeHtml(state.studentId || "-")}</strong></span>
        <span class="chip">자기인식 <strong>&nbsp;${escapeHtml(state.selfIdeology !== null ? IDEOLOGY_OPTIONS[state.selfIdeology].label : "-")}</strong></span>
      </div>
      <p style="color:var(--text-dim); font-size:13px; margin-top:18px;">
        다시 한 번 연구에 참여해주셔서 진심으로 감사드립니다.<br/>
        — 주제탐구 팀 「24시간!」 김예준 · 송경은 · 임성후 · 임유진
      </p>
    </div>
  `);
}

/* ============================================================
 *  네비게이션
 * ============================================================ */
function next() {
  // step transitions
  if (state.step === 0) { state.step = 1; return renderSchool(); }
  if (state.step === 1) {
    if (!state.schoolType) return;
    if (state.schoolType === "민사" && !state.studentId) return;
    if (state.schoolType === "기타" && !state.school) return;
    state.step = 2; return renderQuestion(0);
  }
  if (state.step >= 2 && state.step <= 1 + QUESTIONS.length) {
    const qIdx = state.step - 2;
    if (state.answers[qIdx] === null) return;
    state.step += 1;
    if (state.step <= 1 + QUESTIONS.length) {
      return renderQuestion(state.step - 2);
    } else {
      return renderSelfIdeology();
    }
  }
  if (state.step === 2 + QUESTIONS.length) {
    if (state.selfIdeology === null) return;
    state.step += 1;
    return renderJoinSecond();
  }
  if (state.step === 3 + QUESTIONS.length) {
    state.step += 1;
    if (state.schoolType === "민사" && state.joinSecond === true) {
      return renderThanks();
    } else {
      return renderPreResult();
    }
  }
}

function prev() {
  if (state.step <= 0) return;
  state.step -= 1;
  if (state.step === 0) return renderIntro();
  if (state.step === 1) return renderSchool();
  if (state.step >= 2 && state.step <= 1 + QUESTIONS.length) {
    return renderQuestion(state.step - 2);
  }
  if (state.step === 2 + QUESTIONS.length) return renderSelfIdeology();
  if (state.step === 3 + QUESTIONS.length) return renderJoinSecond();
}

/* expose to global */
window.next = next;
window.prev = prev;
window.selectOption = selectOption;
window.selectSelf = selectSelf;
window.selectJoin = selectJoin;
window.submitSchool = submitSchool;
window.renderResult = renderResult;
window.renderPreResult = renderPreResult;

/* boot */
renderIntro();
</script>
